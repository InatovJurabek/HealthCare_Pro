  <body>
    <section class="container" id="container">
      <div class="form-container">

        <div class="auth-left-panel">
          <h1>Welcome back.</h1>
          <h3>Sign in to access your physical intelligence dashboard.</h3>
          <a href="index.html" class="navbar__logo login-logo">
            <div class="navbar__logo-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="2 12 6 12 8 5 10 19 12 12 14 15 16 12 22 12"/>
              </svg>
            </div>
            <p>HealthCare</p> <strong class="strong-text">Pro</strong>
          </a>
          
        </div>
        <form action="">
          <div class="register-page">
            <div class="register-heading">
              <h2>Create an account</h2>
            </div>
            <div class="browsers">

                </svg> -->
                Facebook
              </a></button>
            </div>
            <div class="divider"><span>Or</span></div>
            <div class="register-form">
              <h5>Full Name</h5>
              <input type="text" class="btn" id="text-field" />
              <span class="error-msg" id="name-error"></span>
              <h5>Email</h5>
              <input type="email" class="btn" id="reg-email-field" />
              <span class="error-msg" id="reg-email-error"></span>
              <h5>Password</h5>
              <div class="password-box">
                <input type="password" class="btn" id="register-password" />
                <i class="eye-icon" data-lucide="eye"></i>
              </div>
              <span class="strength-label" id="strength-label"></span>
              <span class="error-msg" id="reg-password-error"></span>
              <h5>Confirm Password</h5>
              <div class="password-box confirm-password">
                <input type="password" class="btn" id="confirm-password" />
                <i class="eye-icon" data-lucide="eye"></i>
              </div>
              <span class="error-msg" id="confirm-error"></span>
              <button class="confirm-btn">Create Account</button>
              <span class="error-msg" id="register-general-error"></span>
            </div>
            <div class="social-media">
              <p>Already have an account? <a href="#" id="show-login">Login</a></p>
            </div>
          </div>
        </form>

        <form action="">
          <div class="login-page">
            <div class="login-heading">
              <h2>Login</h2>
            </div>
            <div class="login-form">
              <h5>Email</h5>
              <input type="email" class="btn" id="login-email-field" />
              <span class="error-msg" id="login-email-error"></span>
              <h5>Password</h5>
              <div class="password-box">
                <input type="password" class="btn" id="login-password" />
                <i class="eye-icon" data-lucide="eye"></i>
              </div>
              <span class="error-msg" id="login-password-error"></span>
              <a href="#">Forgot password?</a>
              <button class="confirm-btn">Login now</button>
              <span class="error-msg" id="login-general-error"></span>
              <span class="error-msg" id="login-rate-error"></span>
            </div>
            <div class="sign-up-btn">
              <p>Don't have an account? <a href="#" id="show-register">Sign up</a></p>
            </div>
          </div>
        </form>

      </div>
    </section>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../frontend/js/pages/main.js"></script>
    <script>lucide.createIcons();</script>
  </body>
</html>
